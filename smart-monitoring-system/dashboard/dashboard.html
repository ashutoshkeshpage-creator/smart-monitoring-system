<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Monitoring Dashboard</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            text-align:center;
            padding-top:50px;
        }

        .card{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#333;
        }

        .temp{
            font-size:50px;
            margin:20px;
        }

        .status{
            font-size:30px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Smart Monitoring Dashboard</h1>

        <h2>Temperature</h2>
        <div class="temp" id="temperature">0°C</div>

        <h2>Humidity</h2>
        <div class="temp" id="humidity">0%</div>

        <h2>Status</h2>
        <div class="status" id="status">WAITING</div>

        <h2>AI Result</h2>
        <div id="result">No Data</div>

    </div>

    <script>

        async function fetchData(){

            const response = await fetch("http://127.0.0.1:8000/latest");

            const data = await response.json();

            document.getElementById("temperature").innerText =
                data.temperature + " °C";

            document.getElementById("humidity").innerText =
                data.humidity + " %";

            document.getElementById("status").innerText =
                data.status;

            document.getElementById("result").innerText =
                data.result;
        }

        setInterval(fetchData, 2000);

        fetchData();

    </script>

</body>
</html>
